<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ProfiBud — Редактор планування</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0f1117;--sf:#1a1d27;--sf2:#242836;--bd:#333847;--tx:#e4e6ed;--tx2:#7a8194;--ac:#5b8def;--gn:#3dd68c;--rd:#ef5b5b;--or:#f0a050}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--tx);overflow:hidden;height:100vh;display:flex;flex-direction:column}
header{background:var(--sf);border-bottom:1px solid var(--bd);padding:10px 16px;display:flex;align-items:center;gap:16px;z-index:10;flex-shrink:0}
header h1{font-size:16px;font-weight:700;white-space:nowrap}
header h1 span{color:var(--ac)}
.toolbar{display:flex;gap:4px;flex-wrap:wrap}
.tb{padding:6px 14px;border:1px solid var(--bd);border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;background:var(--sf2);color:var(--tx);font-family:inherit;transition:all .15s;white-space:nowrap}
.tb:hover{border-color:var(--ac);color:var(--ac)}
.tb.on{background:var(--ac);color:#fff;border-color:var(--ac)}
.tb.gn{background:var(--gn);color:#000;border-color:var(--gn)}
.tb.rd{border-color:var(--rd);color:var(--rd)}.tb.rd:hover{background:var(--rd);color:#fff}
.sep{width:1px;background:var(--bd);margin:0 6px;align-self:stretch}
.main{flex:1;position:relative;overflow:hidden}
canvas{display:block;cursor:crosshair}
#c3d{display:none;position:absolute;inset:0}
.info{position:absolute;bottom:12px;left:12px;background:var(--sf);border:1px solid var(--bd);border-radius:8px;padding:8px 14px;font-size:11px;color:var(--tx2);pointer-events:none;z-index:5}
.props{position:absolute;top:12px;right:12px;background:var(--sf);border:1px solid var(--bd);border-radius:10px;padding:16px;width:220px;font-size:12px;z-index:5;display:none}
.props.open{display:block}
.props h3{font-size:13px;margin-bottom:10px;color:var(--ac)}
.props label{display:block;color:var(--tx2);font-size:10px;text-transform:uppercase;letter-spacing:.5px;margin:8px 0 3px}
.props input,.props select{width:100%;padding:6px 8px;background:var(--sf2);border:1px solid var(--bd);border-radius:5px;color:var(--tx);font-size:12px;font-family:inherit;outline:none}
.props input:focus{border-color:var(--ac)}
.props .row{display:flex;gap:6px}.props .row>*{flex:1}
.room-label{position:absolute;pointer-events:none;z-index:2}
.ruler3d-label{position:absolute;background:var(--ac);color:#fff;padding:4px 10px;border-radius:6px;font-size:13px;font-weight:700;pointer-events:none;z-index:10;transform:translateX(-50%);white-space:nowrap}
</style>
</head>
<body>
<header>
  <h1><span>ProfiBud</span> Планування</h1>
  <div class="sep"></div>
  <div class="toolbar">
    <button class="tb on" id="tb-select" onclick="setTool('select')">Вибрати</button>
    <button class="tb" id="tb-wall" onclick="setTool('wall')">+ Стіна</button>
    <button class="tb" id="tb-door" onclick="setTool('door')">+ Двері</button>
    <button class="tb" id="tb-window" onclick="setTool('window')">+ Вікно</button>
    <button class="tb" onclick="duplicateWall()">∥ Паралельна</button>
    <button class="tb" id="tb-measure" onclick="setTool('measure')">📏 Лінійка</button>
    <button class="tb" id="tb-dims" onclick="cycleDims()">Розміри: вибране</button>
    <div class="sep"></div>
    <button class="tb rd" onclick="deleteSelected()">Видалити</button>
    <div class="sep"></div>
    <button class="tb" onclick="undo()">Undo</button>
    <button class="tb" onclick="redo()">Redo</button>
    <div class="sep"></div>
    <button class="tb gn" id="tb-3d" onclick="toggle3D()">3D</button>
    <button class="tb" onclick="exportPDF()">PDF</button>
    <button class="tb" onclick="resetToDefault()" style="font-size:10px">Скинути</button>
  </div>
  <div style="flex:1"></div>
  <span style="font-size:11px;color:var(--tx2)" id="coords"></span>
</header>
<div class="main" id="main">
  <canvas id="c2d"></canvas>
  <canvas id="c3d"></canvas>
  <div class="info" id="info">Scroll: масштаб · Alt+клік: рухати план · Клік: вибрати · Delete: видалити · Лінійка: вільне вимірювання, Shift = магніт до стін</div>
  <div class="props" id="props"></div>
</div>

<script>
// ========== DATA ==========
const WALL_T = 100; // wall thickness mm
const WALL_EXT = 200;
const CEIL_H = 2530;
const SNAP = 10; // snap to 10mm grid

let walls = [];
let doors = [];
let windows = [];
let nextId = 1;
function uid(){return nextId++}

// Init apartment — NEW LAYOUT from renovation plan
function initApartment(){
  walls = [];doors = [];windows = [];nextId=1;
  const w = WALL_T; // 100mm interior walls

  // ====== EXTERIOR WALLS (load-bearing, keep all) ======
  const wTop=addWall(0,0, 5590,0, 340, 'ext');        // top 34cm
  const wRight=addWall(5590,0, 5590,7410, 320, 'ext'); // right 32cm
  const wBot=addWall(5590,7410, 0,7410, 80, 'ext');    // bottom 8cm
  const wLeft=addWall(0,7410, 0,0, 100, 'ext');        // left 10cm

  // ====== BEDROOM (pentagon, top-left) ======
  // Right wall of bedroom = partition with living room
  const brW=addWall(3120,0, 3120,4100, w, 'int');      // 3.81m from top down
  // Bottom wall of bedroom (horizontal)
  const bbW=addWall(0,4760, 2440,4760, w, 'int');      // 2.44m from left
  // Diagonal wall (connects bottom wall end to right wall end)
  const bdW=addWall(2440,4760, 3120,4100, w, 'int');   // ~910mm diagonal

  // ====== BATHROOM (pentagon, bottom-center) ======
  // Left wall going up from bottom
  const blW=addWall(1170,7410, 1170,6010, w, 'int');   // 1.40m
  // Diagonal wall (parallel to bedroom diagonal)
  // Direction same as bedroom: (680,-660), length ~910mm
  const bathDiagEndX = 1170+680*910/948;  // ≈1823
  const bathDiagEndY = 6010-660*910/948;  // ≈5377
  const bdiagW=addWall(1170,6010, Math.round(bathDiagEndX),Math.round(bathDiagEndY), w, 'int');
  // Top horizontal wall (with door 50cm)
  const btW=addWall(Math.round(bathDiagEndX),Math.round(bathDiagEndY), 3120,Math.round(bathDiagEndY), w, 'int'); // ~1.16m
  // Right wall (aligned with bedroom partition)
  const brtW=addWall(3120,Math.round(bathDiagEndY), 3120,7410, w, 'int'); // ~2.01m

  // ====== BALCONY (right side, upper area) ======
  addWall(5590,1500, 6490,1500, w, 'ext');   // balcony top
  addWall(6490,1500, 6490,3640, w, 'ext');   // balcony right (900mm deep)
  addWall(6490,3640, 5590,3640, w, 'ext');   // balcony bottom

  // ====== DOORS ======
  // Entry door — 90cm on left wall at bottom (corridor)
  addDoor(wLeft, 0.08, 900, 'right');
  // Bedroom door — 70cm on bedroom bottom wall
  addDoor(bbW, 0.35, 700, 'left');
  // Bathroom door — 50cm on bathroom top wall
  addDoor(btW, 0.4, 500, 'right');
  // Balcony door — 214cm on right wall (upper area)
  addDoor(wRight, 0.35, 2140, 'left');

  // ====== WINDOWS ======
  // Bedroom window — 212cm centered on top wall
  addWindow(wTop, 0.27, 2120);
  // Living room window — 134cm on right wall (lower area)
  addWindow(wRight, 0.78, 1340);

  saveHistory();
}

function addWall(x1,y1,x2,y2,thickness,type){
  const wall = {id:uid(),x1,y1,x2,y2,thickness:thickness||WALL_T,type:type||'int'};
  walls.push(wall);
  return wall;
}
function addDoor(wall,pos,width,swing){
  if(!wall)return null;
  const door = {id:uid(),wallId:wall.id,pos:pos||0.5,width:width||800,swing:swing||'left'};
  doors.push(door);
  return door;
}
function addWindow(wall,pos,width){
  if(!wall)return null;
  const win = {id:uid(),wallId:wall.id,pos:pos||0.5,width:width||1200};
  windows.push(win);
  return win;
}

// ========== HISTORY ==========
let history = [], historyIdx = -1;
function saveHistory(){
  history = history.slice(0,historyIdx+1);
  history.push(JSON.stringify({walls,doors,windows,nextId}));
  historyIdx = history.length-1;
  if(history.length > 50) { history.shift(); historyIdx--; }
}
function undo(){
  if(historyIdx<=0)return;
  historyIdx--;
  restoreState(history[historyIdx]);
}
function redo(){
  if(historyIdx>=history.length-1)return;
  historyIdx++;
  restoreState(history[historyIdx]);
}
function restoreState(json){
  const s=JSON.parse(json);
  walls=s.walls;doors=s.doors;windows=s.windows;nextId=s.nextId;
  selected=null;draw();
}

// ========== CANVAS & VIEW ==========
const c2d = document.getElementById('c2d');
const ctx = c2d.getContext('2d');
let vw, vh;
let camX = 0, camY = 0, zoom = 0.12; // pixels per mm

function resize(){
  const r = window.devicePixelRatio||1;
  const rect = c2d.parentElement.getBoundingClientRect();
  vw = rect.width; vh = rect.height;
  c2d.width = vw*r; c2d.height = vh*r;
  c2d.style.width = vw+'px'; c2d.style.height = vh+'px';
  ctx.setTransform(r,0,0,r,0,0);
  draw();
}
window.addEventListener('resize', resize);

function toScreen(x,y){return [(x-camX)*zoom+vw/2, (y-camY)*zoom+vh/2]}
function toWorld(sx,sy){return [(sx-vw/2)/zoom+camX, (sy-vh/2)/zoom+camY]}
function snapV(v){return Math.round(v/SNAP)*SNAP}

// ========== TOOLS ==========
let tool = 'select';
let selected = null; // {type:'wall'|'door'|'window', id}
let dragging = false, dragStart = null, dragOrig = null;
let panning = false, panStart = null, panCamStart = null;
let wallDraw = null; // {x1,y1} when drawing new wall
let mouseWorld = [0,0];
let hovered = null; // {type, id} — елемент під курсором
let dragEndpoint = null; // 'p1'|'p2' — яку точку стіни тягнемо
let dragMode = null; // 'move'|'p1'|'p2' — режим перетягування
let measureStart = null; // {x,y} — початок вимірювання
let measurements = []; // [{x1,y1,x2,y2}] — збережені вимірювання
let showDims = 'selected'; // 'all'|'selected'|'none' — режим показу розмірів

function setTool(t){
  tool=t;
  document.querySelectorAll('.toolbar .tb').forEach(b=>b.classList.remove('on'));
  const btn = document.getElementById('tb-'+t);
  if(btn)btn.classList.add('on');
  wallDraw = null;
  measureStart = null;
  if(t!=='select')selected=null;
  updateProps();
  draw();
}

// ========== DRAWING ==========
function draw(){
  ctx.clearRect(0,0,vw,vh);
  drawGrid();
  // Draw walls
  walls.forEach(w=>{
    const [sx1,sy1]=toScreen(w.x1,w.y1);
    const [sx2,sy2]=toScreen(w.x2,w.y2);
    const thick = w.thickness * zoom;

    ctx.lineWidth = Math.max(thick, 2);
    const isSel = selected && selected.type==='wall' && selected.id===w.id;
    const isHov = !isSel && hovered && hovered.type==='wall' && hovered.id===w.id;
    if(isSel){
      ctx.strokeStyle = '#5b8def';
    } else if(isHov){
      ctx.strokeStyle = w.type==='ext' ? '#e8a050' : '#c8a050';
      ctx.lineWidth = Math.max(thick+2, 4);
    } else {
      ctx.strokeStyle = w.type==='ext' ? '#c8cdd8' : '#8a8fa0';
    }
    // Draw wall, but skip door/window openings
    drawWallWithOpenings(w, sx1,sy1,sx2,sy2);
    // Draw endpoint handles for selected wall
    if(isSel){
      const hr=7;
      ctx.fillStyle='#5b8def';
      ctx.beginPath();ctx.arc(sx1,sy1,hr,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.arc(sx2,sy2,hr,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#fff';
      ctx.beginPath();ctx.arc(sx1,sy1,3,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.arc(sx2,sy2,3,0,Math.PI*2);ctx.fill();
    }
  });
  // Draw doors
  doors.forEach(d=>{
    const wall = walls.find(w=>w.id===d.wallId);
    if(!wall)return;
    drawDoor(d, wall);
  });
  // Draw windows
  windows.forEach(w=>{
    const wall = walls.find(wl=>wl.id===w.wallId);
    if(!wall)return;
    drawWindow(w, wall);
  });
  // Draw dimensions
  drawDimensions();
  // Draw room names
  drawRoomNames();
  // Wall being drawn
  if(wallDraw){
    const [sx1,sy1]=toScreen(wallDraw.x1,wallDraw.y1);
    const [sx2,sy2]=toScreen(mouseWorld[0],mouseWorld[1]);
    ctx.strokeStyle='rgba(91,141,239,0.6)';ctx.lineWidth=WALL_T*zoom||2;
    ctx.setLineDash([8,4]);ctx.beginPath();ctx.moveTo(sx1,sy1);ctx.lineTo(sx2,sy2);ctx.stroke();ctx.setLineDash([]);
    // Length label
    const dx=mouseWorld[0]-wallDraw.x1, dy=mouseWorld[1]-wallDraw.y1;
    const len=Math.round(Math.sqrt(dx*dx+dy*dy));
    ctx.fillStyle='var(--ac)';ctx.font='bold 12px sans-serif';ctx.textAlign='center';
    ctx.fillText(len+'mm',(sx1+sx2)/2,(sy1+sy2)/2-10);
  }
  // Snap indicator for wall/measure tool
  if((tool==='wall'||tool==='measure') && !panning){
    const [smx,smy]=toScreen(mouseWorld[0],mouseWorld[1]);
    const snap=snapToWallPoint(...toWorld(smx/1,smy/1));
    // Always show cursor dot
    ctx.fillStyle=snap?'#3dd68c':'rgba(91,141,239,0.5)';
    ctx.beginPath();ctx.arc(smx,smy,snap?6:4,0,Math.PI*2);ctx.fill();
    if(snap){
      ctx.strokeStyle='#3dd68c';ctx.lineWidth=1.5;
      ctx.beginPath();ctx.arc(smx,smy,10,0,Math.PI*2);ctx.stroke();
    }
  }
  // Saved measurements
  measurements.forEach((m,i)=>drawMeasureLine(m.x1,m.y1,m.x2,m.y2,i));
  // Active measurement being drawn
  if(measureStart){
    drawMeasureLine(measureStart.x,measureStart.y,mouseWorld[0],mouseWorld[1],-1);
  }
}

function drawMeasureLine(wx1,wy1,wx2,wy2,idx){
  const [sx1,sy1]=toScreen(wx1,wy1);
  const [sx2,sy2]=toScreen(wx2,wy2);
  const dx=wx2-wx1, dy=wy2-wy1;
  const len=Math.round(Math.sqrt(dx*dx+dy*dy));
  const angle=Math.atan2(dy,dx);

  // Line
  ctx.strokeStyle='#ff6b6b';ctx.lineWidth=1.5;
  ctx.setLineDash([6,3]);
  ctx.beginPath();ctx.moveTo(sx1,sy1);ctx.lineTo(sx2,sy2);ctx.stroke();
  ctx.setLineDash([]);

  // Endpoints
  ctx.fillStyle='#ff6b6b';
  ctx.beginPath();ctx.arc(sx1,sy1,4,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(sx2,sy2,4,0,Math.PI*2);ctx.fill();

  // Perpendicular ticks at ends
  const nx=Math.cos(angle+Math.PI/2)*8, ny=Math.sin(angle+Math.PI/2)*8;
  ctx.strokeStyle='#ff6b6b';ctx.lineWidth=1.5;ctx.setLineDash([]);
  ctx.beginPath();ctx.moveTo(sx1-nx,sy1-ny);ctx.lineTo(sx1+nx,sy1+ny);ctx.stroke();
  ctx.beginPath();ctx.moveTo(sx2-nx,sy2-ny);ctx.lineTo(sx2+nx,sy2+ny);ctx.stroke();

  // Label background + text
  const mx=(sx1+sx2)/2, my=(sy1+sy2)/2;
  const lenText = len >= 1000 ? (len/1000).toFixed(2)+' м' : len+' мм';
  ctx.font='bold 12px sans-serif';
  const tw=ctx.measureText(lenText).width;
  // Offset label above line
  const offX=Math.cos(angle+Math.PI/2)*16, offY=Math.sin(angle+Math.PI/2)*16;
  const lx=mx+offX, ly=my+offY;
  ctx.fillStyle='rgba(15,17,23,0.85)';
  ctx.fillRect(lx-tw/2-5, ly-8, tw+10, 16);
  ctx.strokeStyle='#ff6b6b';ctx.lineWidth=1;
  ctx.strokeRect(lx-tw/2-5, ly-8, tw+10, 16);
  ctx.fillStyle='#ff6b6b';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(lenText, lx, ly);

  // Delete button for saved measurements
  if(idx>=0){
    ctx.fillStyle='rgba(239,91,91,0.3)';
    ctx.beginPath();ctx.arc(sx2+12,sy2-12,8,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#ff6b6b';ctx.font='bold 10px sans-serif';
    ctx.fillText('✕',sx2+12,sy2-12);
  }
}

function drawGrid(){
  const step = 500; // 500mm grid
  const [x0,y0]=toWorld(0,0);
  const [x1,y1]=toWorld(vw,vh);
  ctx.strokeStyle='rgba(255,255,255,0.03)';ctx.lineWidth=1;
  const sx=Math.floor(x0/step)*step, sy=Math.floor(y0/step)*step;
  for(let x=sx;x<=x1;x+=step){const[s]=toScreen(x,0);ctx.beginPath();ctx.moveTo(s,0);ctx.lineTo(s,vh);ctx.stroke()}
  for(let y=sy;y<=y1;y+=step){const[,s]=toScreen(0,y);ctx.beginPath();ctx.moveTo(0,s);ctx.lineTo(vw,s);ctx.stroke()}
}

function drawWallWithOpenings(wall, sx1,sy1,sx2,sy2){
  const wdx=wall.x2-wall.x1, wdy=wall.y2-wall.y1;
  const wlen=Math.sqrt(wdx*wdx+wdy*wdy);
  if(wlen===0)return;
  // Collect openings (doors + windows) on this wall
  const openings=[];
  doors.filter(d=>d.wallId===wall.id).forEach(d=>{
    const halfW=d.width/2/wlen;
    openings.push({start:d.pos-halfW, end:d.pos+halfW});
  });
  windows.filter(w=>w.wallId===wall.id).forEach(w=>{
    const halfW=w.width/2/wlen;
    openings.push({start:w.pos-halfW, end:w.pos+halfW});
  });
  openings.sort((a,b)=>a.start-b.start);
  // Draw wall segments between openings
  let t=0;
  ctx.beginPath();
  for(const op of openings){
    if(op.start>t){
      const a=lerp(sx1,sy1,sx2,sy2,t);
      const b=lerp(sx1,sy1,sx2,sy2,op.start);
      ctx.moveTo(a[0],a[1]);ctx.lineTo(b[0],b[1]);
    }
    t=op.end;
  }
  if(t<1){
    const a=lerp(sx1,sy1,sx2,sy2,t);
    ctx.moveTo(a[0],a[1]);ctx.lineTo(sx2,sy2);
  }
  ctx.stroke();
}

function lerp(x1,y1,x2,y2,t){return [x1+(x2-x1)*t, y1+(y2-y1)*t]}

function drawDoor(d, wall){
  const wdx=wall.x2-wall.x1, wdy=wall.y2-wall.y1;
  const wlen=Math.sqrt(wdx*wdx+wdy*wdy);
  if(wlen===0)return;
  const halfW=d.width/2/wlen;
  const p1=lerp(wall.x1,wall.y1,wall.x2,wall.y2,d.pos-halfW);
  const p2=lerp(wall.x1,wall.y1,wall.x2,wall.y2,d.pos+halfW);
  const [s1x,s1y]=toScreen(p1[0],p1[1]);
  const [s2x,s2y]=toScreen(p2[0],p2[1]);
  const isSel=selected&&selected.type==='door'&&selected.id===d.id;
  // Door line
  ctx.strokeStyle=isSel?'#5b8def':'#f0a050';ctx.lineWidth=2;
  ctx.beginPath();ctx.moveTo(s1x,s1y);ctx.lineTo(s2x,s2y);ctx.stroke();
  // Swing arc — side: 'in' (default) or 'out' determines which side of wall
  const r=d.width*zoom;
  const wallAngle=Math.atan2(wdy,wdx);
  const hingeIdx = d.swing==='left'?0:1;
  const [hx,hy] = hingeIdx===0?[s1x,s1y]:[s2x,s2y];
  const startAngle = wallAngle + (hingeIdx===0?0:Math.PI);
  const sideFlip = (d.side==='out') ? -1 : 1;
  const dir = (d.swing==='left'?-1:1) * sideFlip;
  ctx.strokeStyle=isSel?'rgba(91,141,239,0.4)':'rgba(240,160,80,0.3)';
  ctx.lineWidth=1;ctx.beginPath();
  ctx.arc(hx,hy,r,startAngle+Math.PI/2*dir,startAngle,dir>0);
  ctx.stroke();
}

function drawWindow(w, wall){
  const wdx=wall.x2-wall.x1, wdy=wall.y2-wall.y1;
  const wlen=Math.sqrt(wdx*wdx+wdy*wdy);
  if(wlen===0)return;
  const halfW=w.width/2/wlen;
  const p1=lerp(wall.x1,wall.y1,wall.x2,wall.y2,w.pos-halfW);
  const p2=lerp(wall.x1,wall.y1,wall.x2,wall.y2,w.pos+halfW);
  const [s1x,s1y]=toScreen(p1[0],p1[1]);
  const [s2x,s2y]=toScreen(p2[0],p2[1]);
  const isSel=selected&&selected.type==='window'&&selected.id===w.id;
  // Window: double line
  const nx=-(wdy/wlen), ny=wdx/wlen;
  const off=4;
  ctx.strokeStyle=isSel?'#5b8def':'#3dd6d6';ctx.lineWidth=2;
  ctx.beginPath();ctx.moveTo(s1x+nx*off,s1y+ny*off);ctx.lineTo(s2x+nx*off,s2y+ny*off);ctx.stroke();
  ctx.beginPath();ctx.moveTo(s1x-nx*off,s1y-ny*off);ctx.lineTo(s2x-nx*off,s2y-ny*off);ctx.stroke();
  // Cross line
  ctx.strokeStyle=isSel?'rgba(91,141,239,0.3)':'rgba(61,214,214,0.2)';ctx.lineWidth=1;
  const mx=(s1x+s2x)/2, my=(s1y+s2y)/2;
  ctx.beginPath();ctx.moveTo(mx+nx*off,my+ny*off);ctx.lineTo(mx-nx*off,my-ny*off);ctx.stroke();
}

function drawDimensions(){
  if(zoom < 0.04) return;
  walls.forEach(w=>{
    // Check visibility mode
    const isSel = selected && selected.type==='wall' && selected.id===w.id;
    const isHov = hovered && hovered.type==='wall' && hovered.id===w.id;
    if(showDims==='none') return;
    if(showDims==='selected' && !isSel && !isHov) return;

    const dx=w.x2-w.x1, dy=w.y2-w.y1;
    const len=Math.round(Math.sqrt(dx*dx+dy*dy));
    if(len < 100) return;
    const mx=(w.x1+w.x2)/2, my=(w.y1+w.y2)/2;
    const [sx,sy]=toScreen(mx,my);
    const angle=Math.atan2(dy,dx);
    const nx=-Math.sin(angle)*18, ny=Math.cos(angle)*18;
    const lenText = len >= 1000 ? (len/1000).toFixed(2)+'м' : len+'';

    // Background for readability
    ctx.save();
    ctx.translate(sx+nx, sy+ny);
    let textAngle = angle;
    if(textAngle > Math.PI/2) textAngle -= Math.PI;
    if(textAngle < -Math.PI/2) textAngle += Math.PI;
    ctx.rotate(textAngle);
    const fontSize = (isSel||isHov) ? 12 : 10;
    ctx.font=(isSel?'bold ':'')+fontSize+'px sans-serif';
    const tw=ctx.measureText(lenText).width;
    if(showDims==='all'){
      ctx.fillStyle='rgba(15,17,23,0.6)';
      ctx.fillRect(-tw/2-3,-8,tw+6,16);
    }
    ctx.fillStyle=(isSel||isHov)?'#5b8def':'rgba(122,129,148,0.8)';
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(lenText, 0, 0);
    ctx.restore();
  });
}

function drawRoomNames(){
  // Room labels for new layout
  const rooms = [
    {name:'Спальня', x:1400, y:2200, sub:'3.02 × 4.42 м'},
    {name:'Вітальня + Кухня', x:4350, y:3700, sub:'2.47 × 7.31 м'},

    {name:'Ванна', x:2100, y:6700},
    {name:'Балкон', x:6040, y:2570},
  ];
  rooms.forEach(r=>{
    const [sx,sy]=toScreen(r.x,r.y);
    ctx.fillStyle='rgba(228,230,237,0.5)';

    ctx.fillText(r.name, sx, sy);
    if(r.sub){
      ctx.font=Math.max(9,12*zoom/0.12)+'px sans-serif';

// ========== INPUT ==========
c2d.addEventListener('wheel', e=>{
  e.preventDefault();
  const [mx,my] = toWorld(e.offsetX, e.offsetY);
  const factor = e.deltaY < 0 ? 1.15 : 1/1.15;
  zoom *= factor;
  zoom = Math.max(0.01, Math.min(0.5, zoom));
  // Keep mouse position stable
  camX = mx - (e.offsetX - vw/2)/zoom;
  camY = my - (e.offsetY - vh/2)/zoom;
  draw();
}, {passive:false});

c2d.addEventListener('mousedown', e=>{
  const [wx,wy] = toWorld(e.offsetX, e.offsetY);
  mouseWorld = [snapV(wx), snapV(wy)];

  if(e.button === 1 || (e.button===0 && e.altKey)){
    panning = true;
    panStart = [e.offsetX, e.offsetY];
    panCamStart = [camX, camY];
    c2d.style.cursor = 'grabbing';
    return;
  }

  if(e.button !== 0) return;

  if(tool === 'select'){
    // Check if clicking on endpoint of already selected wall
    if(selected && selected.type==='wall'){
      const w = walls.find(x=>x.id===selected.id);
      if(w){
        const epThresh = 20/zoom;
        if(dist(wx,wy,w.x1,w.y1)<epThresh){
          dragging=true; dragMode='p1'; dragStart=[wx,wy];
          dragOrig={x1:w.x1,y1:w.y1,x2:w.x2,y2:w.y2};
          return;
        }
        if(dist(wx,wy,w.x2,w.y2)<epThresh){
          dragging=true; dragMode='p2'; dragStart=[wx,wy];
          dragOrig={x1:w.x1,y1:w.y1,x2:w.x2,y2:w.y2};
          return;
        }
      }
    }
    const hit = hitTest(wx, wy);
    if(hit){
      selected = hit;
      if(hit.type==='wall'){
        const w = walls.find(x=>x.id===hit.id);
        if(w){
          dragging = true; dragMode='move';
          dragStart = [wx,wy];
          dragOrig = {x1:w.x1,y1:w.y1,x2:w.x2,y2:w.y2};
        }
      }
    } else {
      selected = null;
    }
    updateProps();
    draw();
  }
  else if(tool === 'wall'){
    // Magnetic snap to existing wall points
    const snap = snapToWallPoint(wx,wy);
    const px=snap?snap.x:snapV(wx), py=snap?snap.y:snapV(wy);
    if(!wallDraw){
      wallDraw = {x1:px,y1:py};
    } else {
      if(Math.abs(px-wallDraw.x1)+Math.abs(py-wallDraw.y1)>50){
        // Snap to axis if close
        let fx=px,fy=py;
        if(Math.abs(px-wallDraw.x1)<100) fx=wallDraw.x1;
        if(Math.abs(py-wallDraw.y1)<100) fy=wallDraw.y1;
        addWall(wallDraw.x1,wallDraw.y1,fx,fy,WALL_T,'int');
        saveHistory();
      }
      wallDraw=null;
      draw();
    }
  }
  else if(tool === 'door'){
    // Find nearest wall and add door
    const nearest = nearestWall(wx,wy,300/zoom);
    if(nearest){
      addDoor(nearest.wall, nearest.t, 800, 'left');
      selected = {type:'door',id:doors[doors.length-1].id};
      saveHistory();updateProps();draw();
      setTool('select');
    }
  }
  else if(tool === 'window'){
    const nearest = nearestWall(wx,wy,300/zoom);
    if(nearest){
      addWindow(nearest.wall, nearest.t, 1200);
      selected = {type:'window',id:windows[windows.length-1].id};
      saveHistory();updateProps();draw();
      setTool('select');
    }
  }
  else if(tool === 'measure'){
    // Shift = snap to wall, без Shift = вільне вимірювання
    const snap = e.shiftKey ? snapToWallPoint(wx,wy) : null;
    const px=snap?snap.x:snapV(wx), py=snap?snap.y:snapV(wy);
    // Check if clicking on delete button of saved measurement
    for(let i=measurements.length-1;i>=0;i--){
      const m=measurements[i];
      const [sx2,sy2]=toScreen(m.x2,m.y2);
      if(Math.abs(e.offsetX-(sx2+12))<12 && Math.abs(e.offsetY-(sy2-12))<12){
        measurements.splice(i,1);autoSave();draw();return;
      }
    }
    if(!measureStart){
      measureStart={x:px,y:py};
    } else {
      measurements.push({x1:measureStart.x,y1:measureStart.y,x2:px,y2:py});
      measureStart=null;
      draw();
    }
  }
});

c2d.addEventListener('mousemove', e=>{
  const [wx,wy] = toWorld(e.offsetX, e.offsetY);
  // Snap to wall for measure/wall tools
  if(tool==='measure' || tool==='wall'){
    const snap=snapToWallPoint(wx,wy);
    mouseWorld = snap ? [snap.x, snap.y] : [snapV(wx), snapV(wy)];
    // Axis snap for wall tool
    if(tool==='wall' && wallDraw && !snap){
      if(Math.abs(mouseWorld[0]-wallDraw.x1)<100) mouseWorld[0]=wallDraw.x1;
      if(Math.abs(mouseWorld[1]-wallDraw.y1)<100) mouseWorld[1]=wallDraw.y1;
    }
    c2d.style.cursor = snap ? 'crosshair' : 'default';
    if(measureStart || wallDraw) draw();
  } else {
    mouseWorld = [snapV(wx), snapV(wy)];
  }
  document.getElementById('coords').textContent = `${Math.round(wx)} × ${Math.round(wy)} mm`;

  if(panning){
    camX = panCamStart[0] - (e.offsetX - panStart[0])/zoom;
    camY = panCamStart[1] - (e.offsetY - panStart[1])/zoom;
    draw(); return;
  }
  // Hover detection + endpoint cursor
  if(tool==='select' && !dragging){
    const oldHov = hovered;
    hovered = hitTest(wx, wy);
    // Check if near endpoint of selected wall
    let nearEp = false;
    if(selected && selected.type==='wall'){
      const w = walls.find(x=>x.id===selected.id);
      if(w){
        const epT = 20/zoom;
        if(dist(wx,wy,w.x1,w.y1)<epT || dist(wx,wy,w.x2,w.y2)<epT) nearEp=true;
      }
    }
    c2d.style.cursor = nearEp ? 'grab' : hovered ? 'pointer' : 'crosshair';
    if(JSON.stringify(oldHov)!==JSON.stringify(hovered)) draw();
  }
  if(dragging && selected && selected.type==='wall'){
    const w = walls.find(x=>x.id===selected.id);
    if(w){
      const sx=snapV(wx), sy=snapV(wy);
      if(dragMode==='p1'){
        // Розтягуємо початкову точку, зі snap до осі
        let nx=sx, ny=sy;
        if(Math.abs(nx-w.x2)<50) nx=w.x2; // snap vertical
        if(Math.abs(ny-w.y2)<50) ny=w.y2; // snap horizontal
        w.x1=nx; w.y1=ny;
      } else if(dragMode==='p2'){
        // Розтягуємо кінцеву точку
        let nx=sx, ny=sy;
        if(Math.abs(nx-w.x1)<50) nx=w.x1;
        if(Math.abs(ny-w.y1)<50) ny=w.y1;
        w.x2=nx; w.y2=ny;
      } else {
        // Переміщення всієї стіни
        const dx = snapV(wx - dragStart[0]);
        const dy = snapV(wy - dragStart[1]);
        const isH = Math.abs(dragOrig.y1-dragOrig.y2)<10;
        const isV = Math.abs(dragOrig.x1-dragOrig.x2)<10;
        if(isV){
          w.x1=dragOrig.x1+dx; w.x2=dragOrig.x2+dx;
          w.y1=dragOrig.y1; w.y2=dragOrig.y2;
        } else if(isH){
          w.y1=dragOrig.y1+dy; w.y2=dragOrig.y2+dy;
          w.x1=dragOrig.x1; w.x2=dragOrig.x2;
        } else {
          w.x1=dragOrig.x1+dx; w.y1=dragOrig.y1+dy;
          w.x2=dragOrig.x2+dx; w.y2=dragOrig.y2+dy;
        }
      }
      draw();
    }
    return;
  }
  if(wallDraw) draw();
});

c2d.addEventListener('mouseup', e=>{
  if(panning){panning=false;c2d.style.cursor='crosshair';autoSave();return}
  if(dragging){dragging=false;saveHistory();updateProps();return}
});

document.addEventListener('keydown', e=>{
  if(e.key==='Escape'){wallDraw=null;measureStart=null;selected=null;setTool('select');draw()}
  if(e.key==='Delete'||e.key==='Backspace'){if(selected){deleteSelected()}}
  if(e.ctrlKey&&e.key==='z'){e.preventDefault();undo()}
  if(e.ctrlKey&&e.key==='y'){e.preventDefault();redo()}
});

// ========== TOUCH SUPPORT ==========
let touchState = {lastDist:0, lastMid:null, panning:false};

c2d.addEventListener('touchstart', e=>{
  e.preventDefault();
  const touches = e.touches;
  if(touches.length === 2){
    // Pinch zoom start
    const dx=touches[1].clientX-touches[0].clientX, dy=touches[1].clientY-touches[0].clientY;
    touchState.lastDist = Math.sqrt(dx*dx+dy*dy);
    touchState.lastMid = [(touches[0].clientX+touches[1].clientX)/2, (touches[0].clientY+touches[1].clientY)/2];
    touchState.panning = true;
    panCamStart = [camX, camY];
  } else if(touches.length === 1){
    // Single finger = pan
    touchState.panning = true;
    touchState.lastMid = [touches[0].clientX, touches[0].clientY];
    panCamStart = [camX, camY];
  }
}, {passive:false});

c2d.addEventListener('touchmove', e=>{
  e.preventDefault();
  const touches = e.touches;
  if(touches.length === 2){
    // Pinch zoom
    const dx=touches[1].clientX-touches[0].clientX, dy=touches[1].clientY-touches[0].clientY;
    const newDist = Math.sqrt(dx*dx+dy*dy);
    const mid = [(touches[0].clientX+touches[1].clientX)/2, (touches[0].clientY+touches[1].clientY)/2];
    if(touchState.lastDist > 0){
      const factor = newDist / touchState.lastDist;
      const rect = c2d.getBoundingClientRect();
      const [mx,my] = toWorld(mid[0]-rect.left, mid[1]-rect.top);
      zoom *= factor;
      zoom = Math.max(0.01, Math.min(0.5, zoom));
      camX = mx - (mid[0]-rect.left - vw/2)/zoom;
      camY = my - (mid[1]-rect.top - vh/2)/zoom;
    }
    // Pan with two fingers
    if(touchState.lastMid){
      const pdx = (mid[0]-touchState.lastMid[0])/zoom;
      const pdy = (mid[1]-touchState.lastMid[1])/zoom;
      camX -= pdx; camY -= pdy;
    }
    touchState.lastDist = newDist;
    touchState.lastMid = mid;
    draw();
  } else if(touches.length === 1 && touchState.panning){
    // Single finger pan
    const cx=touches[0].clientX, cy=touches[0].clientY;
    if(touchState.lastMid){
      const pdx = (cx-touchState.lastMid[0])/zoom;
      const pdy = (cy-touchState.lastMid[1])/zoom;
      camX -= pdx; camY -= pdy;
    }
    touchState.lastMid = [cx, cy];
    draw();
  }
}, {passive:false});

c2d.addEventListener('touchend', e=>{
  e.preventDefault();
  if(e.touches.length === 0){
    touchState.panning = false;
    touchState.lastDist = 0;
    touchState.lastMid = null;
    autoSave();
  } else if(e.touches.length === 1){
    touchState.lastDist = 0;
    touchState.lastMid = [e.touches[0].clientX, e.touches[0].clientY];
  }
}, {passive:false});

// ========== HIT TESTING ==========
function hitTest(wx,wy){
  const threshold = 15/zoom;
  // Check doors first (smaller targets)
  for(const d of doors){
    const wall = walls.find(w=>w.id===d.wallId);
    if(!wall)continue;
    const p=lerp(wall.x1,wall.y1,wall.x2,wall.y2,d.pos);
    if(dist(wx,wy,p[0],p[1])<threshold*2) return {type:'door',id:d.id};
  }
  // Windows
  for(const w of windows){
    const wall = walls.find(wl=>wl.id===w.wallId);
    if(!wall)continue;
    const p=lerp(wall.x1,wall.y1,wall.x2,wall.y2,w.pos);
    if(dist(wx,wy,p[0],p[1])<threshold*2) return {type:'window',id:w.id};
  }
  // Walls
  for(const w of walls){
    if(distToSeg(wx,wy,w.x1,w.y1,w.x2,w.y2)<threshold+w.thickness/2)
      return {type:'wall',id:w.id};
  }
  return null;
}

function nearestWall(wx,wy,maxDist){
  let best=null,bestD=maxDist;
  for(const w of walls){
    const d=distToSeg(wx,wy,w.x1,w.y1,w.x2,w.y2);
    if(d<bestD){
      bestD=d;
      const t=projectOnSeg(wx,wy,w.x1,w.y1,w.x2,w.y2);
      best={wall:w,dist:d,t:Math.max(0.1,Math.min(0.9,t))};
    }
  }
  return best;
}

function snapToWallPoint(wx,wy){
  const thresh=30/zoom;
  let best=null,bestD=thresh;
  // Snap to wall endpoints
  for(const w of walls){
    let d=dist(wx,wy,w.x1,w.y1);
    if(d<bestD){bestD=d;best={x:w.x1,y:w.y1}}
    d=dist(wx,wy,w.x2,w.y2);
    if(d<bestD){bestD=d;best={x:w.x2,y:w.y2}}
  }
  if(best) return best;
  // Snap to nearest point on wall EDGE (offset by half thickness)
  bestD=thresh;
  for(const w of walls){
    const dx=w.x2-w.x1, dy=w.y2-w.y1;
    const wlen=Math.sqrt(dx*dx+dy*dy);
    if(wlen===0) continue;
    const t=projectOnSeg(wx,wy,w.x1,w.y1,w.x2,w.y2);
    const cx=w.x1+dx*t, cy=w.y1+dy*t;
    // Normal vector (perpendicular to wall)
    const nx=-dy/wlen, ny=dx/wlen;
    const halfT=w.thickness/2;
    // Two edges of the wall
    const e1x=cx+nx*halfT, e1y=cy+ny*halfT;
    const e2x=cx-nx*halfT, e2y=cy-ny*halfT;
    const d1=dist(wx,wy,e1x,e1y);
    const d2=dist(wx,wy,e2x,e2y);
    if(d1<bestD){bestD=d1;best={x:Math.round(e1x),y:Math.round(e1y)}}
    if(d2<bestD){bestD=d2;best={x:Math.round(e2x),y:Math.round(e2y)}}
  }
  return best;
}

function cycleDims(){
  const modes=['selected','all','none'];
  const labels=['Розміри: вибране','Розміри: всі','Розміри: вимк'];
  const idx=modes.indexOf(showDims);
  showDims=modes[(idx+1)%3];
  document.getElementById('tb-dims').textContent=labels[(idx+1)%3];
  draw();
}

function dist(x1,y1,x2,y2){return Math.sqrt((x2-x1)**2+(y2-y1)**2)}
function distToSeg(px,py,x1,y1,x2,y2){
  const t=projectOnSeg(px,py,x1,y1,x2,y2);
  const cx=x1+(x2-x1)*t, cy=y1+(y2-y1)*t;
  return dist(px,py,cx,cy);
}
function projectOnSeg(px,py,x1,y1,x2,y2){
  const dx=x2-x1,dy=y2-y1,len2=dx*dx+dy*dy;
  if(len2===0)return 0;
  return Math.max(0,Math.min(1,((px-x1)*dx+(py-y1)*dy)/len2));
}

// ========== DELETE ==========
function deleteSelected(){
  if(!selected)return;
  if(selected.type==='wall'){
    // Also remove doors/windows on this wall
    doors = doors.filter(d=>d.wallId!==selected.id);
    windows = windows.filter(w=>w.wallId!==selected.id);
    walls = walls.filter(w=>w.id!==selected.id);
  } else if(selected.type==='door'){
    doors = doors.filter(d=>d.id!==selected.id);
  } else if(selected.type==='window'){
    windows = windows.filter(w=>w.id!==selected.id);
  }
  selected=null;
  saveHistory();updateProps();draw();
}

// ========== DUPLICATE / PARALLEL ==========
function duplicateWall(){
  if(!selected || selected.type!=='wall') return;
  const w=walls.find(x=>x.id===selected.id);
  if(!w) return;
  const offset = 300; // 300mm offset
  const dx=w.x2-w.x1, dy=w.y2-w.y1;
  const len=Math.sqrt(dx*dx+dy*dy);
  if(len===0) return;
  // Normal vector (perpendicular)
  const nx=-dy/len*offset, ny=dx/len*offset;
  const nw=addWall(w.x1+nx,w.y1+ny,w.x2+nx,w.y2+ny,w.thickness,w.type);
  selected={type:'wall',id:nw.id};
  saveHistory();updateProps();draw();
}

// ========== SET WALL LENGTH ==========
function setWallLength(id, newLen){
  const w=walls.find(x=>x.id===id);
  if(!w) return;
  const dx=w.x2-w.x1, dy=w.y2-w.y1;
  const curLen=Math.sqrt(dx*dx+dy*dy);
  if(curLen===0) return;
  const scale=newLen/curLen;
  // Keep p1 fixed, move p2
  w.x2=Math.round(w.x1+dx*scale);
  w.y2=Math.round(w.y1+dy*scale);
  saveHistory();updateProps();draw();
}

// ========== PROPERTIES PANEL ==========
function updateProps(){

  panel.classList.add('open');

    const w=walls.find(x=>x.id===selected.id);

    html=`<h3>Стіна</h3>
      <label>Довжина (мм)</label><input type="number" value="${len}" style="font-size:16px;font-weight:700;color:var(--ac)" onchange="setWallLength(${w.id},+this.value)">
      <label>Товщина (мм)</label><input type="number" value="${w.thickness}" onchange="editWall(${w.id},'thickness',+this.value)">
      <label>Тип</label><select onchange="editWall(${w.id},'type',this.value)">
        <option value="ext" ${w.type==='ext'?'selected':''}>Зовнішня</option>
        <option value="int" ${w.type==='int'?'selected':''}>Перегородка</option>
      </select>
      <div class="row" style="margin-top:10px">
        <div><label>X1</label><input type="number" value="${w.x1}" onchange="editWall(${w.id},'x1',+this.value)"></div>
        <div><label>Y1</label><input type="number" value="${w.y1}" onchange="editWall(${w.id},'y1',+this.value)"></div>
      </div>
      <div class="row">
        <div><label>X2</label><input type="number" value="${w.x2}" onchange="editWall(${w.id},'x2',+this.value)"></div>
        <div><label>Y2</label><input type="number" value="${w.y2}" onchange="editWall(${w.id},'y2',+this.value)"></div>
      </div>
      <button class="tb" onclick="duplicateWall()" style="width:100%;margin-top:12px">∥ Паралельна копія</button>`;
  } else if(selected.type==='door'){
    const d=doors.find(x=>x.id===selected.id);
    if(!d){panel.classList.remove('open');return}
    const side=d.side||'in';
    html=`<h3>Двері</h3>
      <label>Ширина (мм)</label><input type="number" value="${d.width}" onchange="editDoor(${d.id},'width',+this.value)">
      <label>Позиція (0-1)</label><input type="number" step="0.01" min="0.05" max="0.95" value="${d.pos.toFixed(2)}" onchange="editDoor(${d.id},'pos',+this.value)">
      <label>Петлі</label><select onchange="editDoor(${d.id},'swing',this.value)">
        <option value="left" ${d.swing==='left'?'selected':''}>Ліві</option>
        <option value="right" ${d.swing==='right'?'selected':''}>Праві</option>
      </select>
      <label>Напрямок</label><select onchange="editDoor(${d.id},'side',this.value)">
        <option value="in" ${side==='in'?'selected':''}>Всередину</option>
        <option value="out" ${side==='out'?'selected':''}>Назовні</option>
      </select>`;
  } else if(selected.type==='window'){
    const w=windows.find(x=>x.id===selected.id);
    if(!w){panel.classList.remove('open');return}
    html=`<h3>Вікно</h3>
      <label>Ширина (мм)</label><input type="number" value="${w.width}" onchange="editWindow(${w.id},'width',+this.value)">
      <label>Позиція (0-1)</label><input type="number" step="0.01" min="0.05" max="0.95" value="${w.pos.toFixed(2)}" onchange="editWindow(${w.id},'pos',+this.value)">`;
  }
  panel.innerHTML=html;
}

function editWall(id,key,val){const w=walls.find(x=>x.id===id);if(w){w[key]=val;saveHistory();draw()}}
function editDoor(id,key,val){const d=doors.find(x=>x.id===id);if(d){d[key]=val;saveHistory();draw()}}
function editWindow(id,key,val){const w=windows.find(x=>x.id===id);if(w){w[key]=val;saveHistory();draw()}}

// ========== 3D VIEW ==========
let scene3d, camera3d, renderer3d, controls3d, is3D=false;
let orbitAngle=0, orbitRadius=12, orbitY=8, orbitTarget={x:3,y:0,z:4};
let mouse3d={x:0,y:0,down:false,button:-1,lastX:0,lastY:0};

function toggle3D(){
  is3D = !is3D;
  document.getElementById('c2d').style.display = is3D?'none':'block';
  document.getElementById('c3d').style.display = is3D?'block':'none';
  document.getElementById('tb-3d').classList.toggle('on', is3D);
  if(is3D) init3D();
  else { draw(); }
}

function init3D(){
  const canvas3d = document.getElementById('c3d');
  const rect = canvas3d.parentElement.getBoundingClientRect();
  const w=rect.width, h=rect.height;
  canvas3d.width=w; canvas3d.height=h;
  canvas3d.style.width=w+'px'; canvas3d.style.height=h+'px';

  scene3d = new THREE.Scene();
  scene3d.background = new THREE.Color(0x1a1d27);

  camera3d = new THREE.PerspectiveCamera(50, w/h, 0.1, 100);
  renderer3d = new THREE.WebGLRenderer({canvas:canvas3d, antialias:true});
  renderer3d.setSize(w,h);
  renderer3d.shadowMap.enabled = true;

  // Lights
  const amb = new THREE.AmbientLight(0xffffff, 0.4);
  scene3d.add(amb);
  const dir = new THREE.DirectionalLight(0xffffff, 0.8);
  dir.position.set(5,10,5);
  dir.castShadow=true;
  scene3d.add(dir);
  const hemi = new THREE.HemisphereLight(0x8ec8ff, 0x444444, 0.3);
  scene3d.add(hemi);

  // Scale: 1 unit = 1 meter
  const scale = 0.001;

  // Floor
  const floorGeo = new THREE.PlaneGeometry(20,20);
  const floorMat = new THREE.MeshStandardMaterial({color:0x2a2d38, side:THREE.DoubleSide});
  const floor = new THREE.Mesh(floorGeo, floorMat);
  floor.rotation.x = -Math.PI/2;
  floor.receiveShadow = true;
  scene3d.add(floor);

  // Apartment floor (lighter)
  const aptPoints = getApartmentFloorShape(scale);
  if(aptPoints.length > 2){
    const shape = new THREE.Shape();
    shape.moveTo(aptPoints[0].x, aptPoints[0].y);
    for(let i=1;i<aptPoints.length;i++) shape.lineTo(aptPoints[i].x, aptPoints[i].y);
    shape.closePath();
    const floorGeo2 = new THREE.ShapeGeometry(shape);
    const floorMat2 = new THREE.MeshStandardMaterial({color:0x3a3d48});
    const floor2 = new THREE.Mesh(floorGeo2, floorMat2);
    floor2.rotation.x=-Math.PI/2; floor2.position.y=0.01;
    floor2.receiveShadow=true;
    scene3d.add(floor2);
  }

  // Walls as 3D boxes
  const wallH = CEIL_H * scale;
  const wallMat = new THREE.MeshStandardMaterial({color:0xd4d0c8, side:THREE.DoubleSide});
  const wallMatExt = new THREE.MeshStandardMaterial({color:0xc8c4bc, side:THREE.DoubleSide});

  walls.forEach(w=>{
    const dx=(w.x2-w.x1)*scale, dz=(w.y2-w.y1)*scale;
    const len=Math.sqrt(dx*dx+dz*dz);
    if(len<0.01)return;
    const thick=w.thickness*scale;
    const angle=Math.atan2(dz,dx);

    // Get openings for this wall
    const wlen=Math.sqrt((w.x2-w.x1)**2+(w.y2-w.y1)**2);
    const wallOpenings=[];
    doors.filter(d=>d.wallId===w.id).forEach(d=>{
      const halfW=d.width/2/wlen;
      wallOpenings.push({start:d.pos-halfW, end:d.pos+halfW, height:2100*scale, bottom:0});
    });
    windows.filter(wi=>wi.wallId===w.id).forEach(wi=>{
      const halfW=wi.width/2/wlen;
      wallOpenings.push({start:wi.pos-halfW, end:wi.pos+halfW, height:1500*scale, bottom:900*scale});
    });
    wallOpenings.sort((a,b)=>a.start-b.start);

    const mat = w.type==='ext'?wallMatExt:wallMat;

    if(wallOpenings.length===0){
      // Simple wall
      const geo=new THREE.BoxGeometry(len,wallH,thick);
      const mesh=new THREE.Mesh(geo, mat);
      mesh.position.set(w.x1*scale+dx/2, wallH/2, w.y1*scale+dz/2);
      mesh.rotation.y=-angle;
      mesh.castShadow=true; mesh.receiveShadow=true;
      scene3d.add(mesh);
    } else {
      // Wall with openings: draw solid segments + above/below openings
      let t=0;
      for(const op of wallOpenings){
        // Solid before opening
        if(op.start>t+0.001){
          const segLen=(op.start-t)*len;
          const segMid=t+(op.start-t)/2;
          const geo=new THREE.BoxGeometry(segLen,wallH,thick);
          const mesh=new THREE.Mesh(geo, mat);
          const p=lerpV(w.x1*scale,w.y1*scale,(w.x2)*scale,(w.y2)*scale,segMid);
          mesh.position.set(p[0],wallH/2,p[1]);
          mesh.rotation.y=-angle;
          mesh.castShadow=true;
          scene3d.add(mesh);
        }
        // Above opening
        const opLen=(op.end-op.start)*len;
        const opMid=op.start+(op.end-op.start)/2;
        const topH=wallH-(op.bottom+op.height);
        if(topH>0.01){
          const geo=new THREE.BoxGeometry(opLen,topH,thick);
          const mesh=new THREE.Mesh(geo, mat);
          const p=lerpV(w.x1*scale,w.y1*scale,w.x2*scale,w.y2*scale,opMid);
          mesh.position.set(p[0],op.bottom+op.height+topH/2,p[1]);
          mesh.rotation.y=-angle;
          scene3d.add(mesh);
        }
        // Below opening (for windows)
        if(op.bottom>0.01){
          const geo=new THREE.BoxGeometry(opLen,op.bottom,thick);
          const mesh=new THREE.Mesh(geo, mat);
          const p=lerpV(w.x1*scale,w.y1*scale,w.x2*scale,w.y2*scale,opMid);
          mesh.position.set(p[0],op.bottom/2,p[1]);
          mesh.rotation.y=-angle;
          scene3d.add(mesh);
        }
        t=op.end;
      }
      // Solid after last opening
      if(t<0.999){
        const segLen=(1-t)*len;
        const segMid=t+(1-t)/2;
        const geo=new THREE.BoxGeometry(segLen,wallH,thick);
        const mesh=new THREE.Mesh(geo, mat);
        const p=lerpV(w.x1*scale,w.y1*scale,w.x2*scale,w.y2*scale,segMid);
        mesh.position.set(p[0],wallH/2,p[1]);
        mesh.rotation.y=-angle;
        mesh.castShadow=true;
        scene3d.add(mesh);
      }
    }
  });

  function lerpV(x1,z1,x2,z2,t){return [x1+(x2-x1)*t, z1+(z2-z1)*t]}

  // Camera position
  orbitTarget = {x:2.8, y:0, z:3.7};
  updateCamera3d();

  // Mouse controls for 3D
  const c3 = document.getElementById('c3d');
  c3.addEventListener('mousedown', e=>{mouse3d.down=true;mouse3d.button=e.button;mouse3d.lastX=e.clientX;mouse3d.lastY=e.clientY});
  c3.addEventListener('mouseup', ()=>{mouse3d.down=false});
  c3.addEventListener('mousemove', e=>{
    if(!mouse3d.down)return;
    const dx=e.clientX-mouse3d.lastX, dy=e.clientY-mouse3d.lastY;
    mouse3d.lastX=e.clientX;mouse3d.lastY=e.clientY;
    if(mouse3d.button===0){
      orbitAngle -= dx*0.01;
      orbitY = Math.max(1,Math.min(20,orbitY+dy*0.05));
    } else if(mouse3d.button===2||mouse3d.button===1){
      orbitTarget.x -= dx*0.01;
      orbitTarget.z -= dy*0.01;
    }
    updateCamera3d();
  });
  c3.addEventListener('wheel', e=>{
    e.preventDefault();
    orbitRadius = Math.max(3,Math.min(30,orbitRadius+e.deltaY*0.01));
    updateCamera3d();
  },{passive:false});
  c3.addEventListener('contextmenu', e=>e.preventDefault());
  c3.addEventListener('click', onCanvas3dClick);

  clearRuler3d();
  animate3d();
}

function updateCamera3d(){
  if(!camera3d)return;
  camera3d.position.set(
    orbitTarget.x + Math.sin(orbitAngle)*orbitRadius,
    orbitY,
    orbitTarget.z + Math.cos(orbitAngle)*orbitRadius
  );
  camera3d.lookAt(orbitTarget.x, 1.5, orbitTarget.z);
}

// ========== 3D RULER ==========
let ruler3dPoints = []; // [{x,y,z}] max 2
let ruler3dLine = null;
let ruler3dLabel = null;
let raycaster3d = new THREE.Raycaster();
let mouse3dVec = new THREE.Vector2();

function onCanvas3dClick(e){
  if(tool !== 'measure' || !is3D || !camera3d) return;
  const rect = document.getElementById('c3d').getBoundingClientRect();
  mouse3dVec.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
  mouse3dVec.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
  raycaster3d.setFromCamera(mouse3dVec, camera3d);
  // Get all wall meshes (filter by userData or just all meshes except floor)
  const meshes = [];
  scene3d.traverse(obj => {
    if(obj.isMesh && obj.geometry && obj.geometry.type === 'BoxGeometry') meshes.push(obj);
  });
  const hits = raycaster3d.intersectObjects(meshes);
  if(hits.length === 0) return;
  const pt = hits[0].point.clone();
  // Snap to wall surface
  ruler3dPoints.push(pt);
  // Add visual marker
  const markerGeo = new THREE.SphereGeometry(0.05, 16, 16);
  const markerMat = new THREE.MeshBasicMaterial({color: 0x5b8def});
  const marker = new THREE.Mesh(markerGeo, markerMat);
  marker.position.copy(pt);
  marker.userData.isRuler = true;
  scene3d.add(marker);

  if(ruler3dPoints.length === 2){
    // Draw line between points
    const lineMat = new THREE.LineBasicMaterial({color: 0x5b8def, linewidth: 2});
    const lineGeo = new THREE.BufferGeometry().setFromPoints(ruler3dPoints);
    ruler3dLine = new THREE.Line(lineGeo, lineMat);
    ruler3dLine.userData.isRuler = true;
    scene3d.add(ruler3dLine);
    // Calculate distance in mm
    const dx = (ruler3dPoints[1].x - ruler3dPoints[0].x) * 1000;
    const dy = (ruler3dPoints[1].y - ruler3dPoints[0].y) * 1000;
    const dz = (ruler3dPoints[1].z - ruler3dPoints[0].z) * 1000;
    const distMm = Math.round(Math.sqrt(dx*dx + dy*dy + dz*dz));
    const distText = distMm >= 1000 ? (distMm/1000).toFixed(2)+' м' : distMm+' мм';
    // Show label as CSS overlay
    showRuler3dLabel(ruler3dPoints[0], ruler3dPoints[1], distText);
  }
  if(ruler3dPoints.length > 2){
    clearRuler3d();
  }
}

function showRuler3dLabel(p1, p2, text){
  removeRuler3dLabel();
  const mid = new THREE.Vector3().addVectors(p1, p2).multiplyScalar(0.5);
  ruler3dLabel = document.createElement('div');
  ruler3dLabel.className = 'ruler3d-label';
  ruler3dLabel.textContent = text;
  document.getElementById('main').appendChild(ruler3dLabel);
  // Update position in animate loop
  ruler3dLabel._worldPos = mid;
}

function updateRuler3dLabel(){
  if(!ruler3dLabel || !ruler3dLabel._worldPos || !camera3d) return;
  const pos = ruler3dLabel._worldPos.clone().project(camera3d);
  const rect = document.getElementById('c3d').getBoundingClientRect();
  const x = (pos.x * 0.5 + 0.5) * rect.width;
  const y = (-pos.y * 0.5 + 0.5) * rect.height;
  ruler3dLabel.style.left = x + 'px';
  ruler3dLabel.style.top = (y - 30) + 'px';
}

function removeRuler3dLabel(){
  if(ruler3dLabel && ruler3dLabel.parentNode) ruler3dLabel.parentNode.removeChild(ruler3dLabel);
  ruler3dLabel = null;
}

function clearRuler3d(){
  ruler3dPoints = [];
  if(scene3d){
    const toRemove = [];
    scene3d.traverse(obj => { if(obj.userData && obj.userData.isRuler) toRemove.push(obj); });
    toRemove.forEach(obj => scene3d.remove(obj));
  }
  ruler3dLine = null;
  removeRuler3dLabel();
}

function animate3d(){
  if(!is3D)return;
  requestAnimationFrame(animate3d);
  updateRuler3dLabel();
  renderer3d.render(scene3d, camera3d);
}

function getApartmentFloorShape(s){
  // Find exterior walls and trace outline
  const ext = walls.filter(w=>w.type==='ext');
  if(ext.length<3)return [];
  // Collect all unique points
  const pts = [];
  ext.forEach(w=>{
    pts.push({x:w.x1*s,y:w.y1*s});
    pts.push({x:w.x2*s,y:w.y2*s});
  });
  // Sort by angle from centroid
  const cx=pts.reduce((s,p)=>s+p.x,0)/pts.length;
  const cy=pts.reduce((s,p)=>s+p.y,0)/pts.length;
  // Deduplicate
  const unique=[];
  pts.forEach(p=>{
    if(!unique.find(u=>Math.abs(u.x-p.x)<0.01&&Math.abs(u.y-p.y)<0.01))
      unique.push(p);
  });
  unique.sort((a,b)=>Math.atan2(a.y-cy,a.x-cx)-Math.atan2(b.y-cy,b.x-cx));
  return unique;
}

// ========== PDF EXPORT ==========
function exportPDF(){
  // Render plan to offscreen canvas at high res
  const pad = 200; // mm padding
  let minX=Infinity, minY=Infinity, maxX=-Infinity, maxY=-Infinity;
  walls.forEach(w=>{
    minX=Math.min(minX,w.x1,w.x2); minY=Math.min(minY,w.y1,w.y2);
    maxX=Math.max(maxX,w.x1,w.x2); maxY=Math.max(maxY,w.y1,w.y2);
  });
  minX-=pad; minY-=pad; maxX+=pad; maxY+=pad;
  const planW=maxX-minX, planH=maxY-minY;

  // A4 landscape: 297x210mm → scale plan to fit
  const pdfW=297, pdfH=210;
  const scaleX=(pdfW-20)/planW*1000, scaleY=(pdfH-20)/planH*1000;
  const pdfScale=Math.min(scaleX,scaleY);

  // Create offscreen canvas
  const offW=Math.ceil(planW*pdfScale/1000);
  const offH=Math.ceil(planH*pdfScale/1000);
  const off=document.createElement('canvas');
  off.width=offW*2; off.height=offH*2; // 2x for sharpness
  const oc=off.getContext('2d');
  oc.scale(2,2);
  oc.fillStyle='#ffffff';
  oc.fillRect(0,0,offW,offH);

  // Transform: plan mm → canvas px
  function tx(x){return (x-minX)*pdfScale/1000}
  function ty(y){return (y-minY)*pdfScale/1000}

  // Draw walls
  walls.forEach(w=>{
    oc.strokeStyle=w.type==='ext'?'#222':'#666';
    oc.lineWidth=Math.max(w.thickness*pdfScale/1000, 1.5);
    // Draw with openings
    const wdx=w.x2-w.x1, wdy=w.y2-w.y1, wlen=Math.sqrt(wdx*wdx+wdy*wdy);
    if(wlen===0)return;
    const openings=[];
    doors.filter(d=>d.wallId===w.id).forEach(d=>{
      openings.push({start:d.pos-d.width/2/wlen, end:d.pos+d.width/2/wlen});
    });
    windows.filter(wi=>wi.wallId===w.id).forEach(wi=>{
      openings.push({start:wi.pos-wi.width/2/wlen, end:wi.pos+wi.width/2/wlen});
    });
    openings.sort((a,b)=>a.start-b.start);
    let t=0;
    oc.beginPath();
    for(const op of openings){
      if(op.start>t){
        const a=[tx(w.x1+wdx*t),ty(w.y1+wdy*t)];
        const b=[tx(w.x1+wdx*op.start),ty(w.y1+wdy*op.start)];
        oc.moveTo(a[0],a[1]);oc.lineTo(b[0],b[1]);
      }
      t=op.end;
    }
    if(t<1){
      const a=[tx(w.x1+wdx*t),ty(w.y1+wdy*t)];
      oc.moveTo(a[0],a[1]);oc.lineTo(tx(w.x2),ty(w.y2));
    }
    oc.stroke();
  });

  // Draw doors
  doors.forEach(d=>{
    const wall=walls.find(w=>w.id===d.wallId);
    if(!wall)return;
    const wdx=wall.x2-wall.x1,wdy=wall.y2-wall.y1,wlen=Math.sqrt(wdx*wdx+wdy*wdy);
    if(wlen===0)return;
    const p1x=wall.x1+wdx*(d.pos-d.width/2/wlen), p1y=wall.y1+wdy*(d.pos-d.width/2/wlen);
    const p2x=wall.x1+wdx*(d.pos+d.width/2/wlen), p2y=wall.y1+wdy*(d.pos+d.width/2/wlen);
    oc.strokeStyle='#e67e22';oc.lineWidth=1.5;
    oc.beginPath();oc.moveTo(tx(p1x),ty(p1y));oc.lineTo(tx(p2x),ty(p2y));oc.stroke();
  });

  // Draw windows
  windows.forEach(w=>{
    const wall=walls.find(wl=>wl.id===w.wallId);
    if(!wall)return;
    const wdx=wall.x2-wall.x1,wdy=wall.y2-wall.y1,wlen=Math.sqrt(wdx*wdx+wdy*wdy);
    if(wlen===0)return;
    const p1x=wall.x1+wdx*(w.pos-w.width/2/wlen), p1y=wall.y1+wdy*(w.pos-w.width/2/wlen);
    const p2x=wall.x1+wdx*(w.pos+w.width/2/wlen), p2y=wall.y1+wdy*(w.pos+w.width/2/wlen);
    const nx=-(wdy/wlen)*3, ny=(wdx/wlen)*3;
    oc.strokeStyle='#3498db';oc.lineWidth=1.5;
    oc.beginPath();oc.moveTo(tx(p1x)+nx,ty(p1y)+ny);oc.lineTo(tx(p2x)+nx,ty(p2y)+ny);oc.stroke();
    oc.beginPath();oc.moveTo(tx(p1x)-nx,ty(p1y)-ny);oc.lineTo(tx(p2x)-nx,ty(p2y)-ny);oc.stroke();
  });

  // Draw dimensions
  oc.fillStyle='#555';oc.font='9px sans-serif';oc.textAlign='center';oc.textBaseline='middle';
  walls.forEach(w=>{
    const dx=w.x2-w.x1,dy=w.y2-w.y1,len=Math.round(Math.sqrt(dx*dx+dy*dy));
    if(len<200)return;
    const mx=tx((w.x1+w.x2)/2), my=ty((w.y1+w.y2)/2);
    const angle=Math.atan2(dy,dx);
    const nx=-Math.sin(angle)*12, ny=Math.cos(angle)*12;
    oc.save();oc.translate(mx+nx,my+ny);
    let ta=angle;if(ta>Math.PI/2)ta-=Math.PI;if(ta<-Math.PI/2)ta+=Math.PI;
    oc.rotate(ta);
    oc.fillText(len+'', 0, 0);
    oc.restore();
  });

  // Draw room names
  oc.fillStyle='#333';oc.font='bold 12px sans-serif';oc.textAlign='center';
  const rooms=[
    {name:'Спальня',x:1400,y:2200},{name:'Вітальня + Кухня',x:4350,y:3700},
    {name:'Коридор',x:580,y:6100},{name:'Ванна',x:2100,y:6700},{name:'Балкон',x:6040,y:2570}
  ];
  rooms.forEach(r=>oc.fillText(r.name, tx(r.x), ty(r.y)));

  // Draw measurements
  oc.strokeStyle='#5b8def';oc.lineWidth=1;oc.setLineDash([4,3]);
  measurements.forEach(m=>{
    oc.beginPath();oc.moveTo(tx(m.x1),ty(m.y1));oc.lineTo(tx(m.x2),ty(m.y2));oc.stroke();
    const dx=m.x2-m.x1,dy=m.y2-m.y1,len=Math.round(Math.sqrt(dx*dx+dy*dy));
    const mx=tx((m.x1+m.x2)/2), my=ty((m.y1+m.y2)/2);
    oc.fillStyle='#5b8def';oc.font='bold 9px sans-serif';
    oc.fillText(len>=1000?(len/1000).toFixed(2)+'м':len+'мм', mx, my-8);
  });
  oc.setLineDash([]);

  // Generate PDF
  const {jsPDF} = window.jspdf;
  const pdf = new jsPDF({orientation:'landscape', unit:'mm', format:'a4'});
  // Title
  pdf.setFontSize(14);
  pdf.text('ProfiBud — План квартири', 10, 10);
  pdf.setFontSize(8);
  pdf.text(new Date().toLocaleDateString('uk-UA'), 260, 10);
  // Add canvas as image
  const imgData = off.toDataURL('image/png');
  const imgW = pdfW-20, imgH = offH/offW*(pdfW-20);
  const finalH = Math.min(imgH, pdfH-20);
  const finalW = finalH/imgH*imgW;
  pdf.addImage(imgData, 'PNG', 10, 15, finalW, finalH);
  pdf.save('plan.pdf');
}

// ========== AUTO-SAVE / LOAD ==========
const SAVE_KEY = 'profibud_plan';
function autoSave(){
  try{
    localStorage.setItem(SAVE_KEY, JSON.stringify({
      walls, doors, windows, measurements, nextId,
      cam:{x:camX,y:camY,z:zoom}
    }));
  }catch(e){}
}
function autoLoad(){
  try{
    const raw = localStorage.getItem(SAVE_KEY);
    if(!raw) return false;
    const s = JSON.parse(raw);
    walls=s.walls||[]; doors=s.doors||[]; windows=s.windows||[];
    measurements=s.measurements||[]; nextId=s.nextId||1;
    if(s.cam){camX=s.cam.x; camY=s.cam.y; zoom=s.cam.z;}
    saveHistory();
    return true;
  }catch(e){return false}
}
function resetToDefault(){
  if(!confirm('Скинути план до початкового? Всі зміни будуть втрачені.')) return;
  localStorage.removeItem(SAVE_KEY);
  initApartment();
  camX=3300; camY=3700; zoom=0.12;
  measurements=[];
  draw();
}
// Override saveHistory to also auto-save
const _origSaveHistory = saveHistory;
saveHistory = function(){_origSaveHistory(); autoSave();};

// ========== INIT ==========
if(!autoLoad()){
  initApartment();
  camX = 3300; camY = 3700;
}
resize();
setTimeout(draw, 100);
</script>
